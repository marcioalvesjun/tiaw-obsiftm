<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecionando...</title>
  <script>
    (function () {
      var segmentCount = 1;
      var location = window.location;
      var repoBase = location.pathname.split("/").slice(0, 1 + segmentCount).join("/");
      var routePath = location.pathname
        .split("/")
        .slice(1 + segmentCount)
        .join("/")
        .replace(/&/g, "~and~");
      var query = location.search
        ? "&" + location.search.slice(1).replace(/&/g, "~and~")
        : "";

      location.replace(
        location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          repoBase +
          "/?/" +
          routePath +
          query +
          location.hash
      );
    })();
  </script>
</head>

<body>
  <p>Redirecionando...</p>
</body>

</html>
